name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Pastikan branch kamu memang bernama 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push Backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Masuk secara spesifik ke folder backend
          cd NLP_backend
          
          # 2. Buat repositori Git bayangan khusus untuk folder ini
          git init
          git checkout -b main
          
          # 3. Atur identitas robot GitHub
          git config user.email "action@github.com"
          git config user.name "GitHub Action Bot"
          
          # 4. Masukkan semua file backend & commit
          git add .
          git commit -m "Deploy Backend to Hugging Face"
          
          # 5. Force push HANYA isi folder backend ke Hugging Face
          git push --force https://chicknug19:${HF_TOKEN}@huggingface.co/spaces/chicknug19/aol-nlp main